name: Main Pipeline

on:
  workflow_dispatch

jobs:

  build:
    uses: ./.github/workflows/build.yml
    with:
      build_type: spring-boot

  deploy-dev:
    needs: build
    uses: ./.github/workflows/ecs-deploy.yml
    with:
      environment: Dev

  deploy-prod:
    needs: deploy-dev
    uses: ./.github/workflows/ecs-deploy.yml
    with:
      environment: Prod