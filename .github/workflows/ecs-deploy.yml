name: ECS Deploy Pipeline

on:
  workflow_call:
    inputs:
      build_type:
        required: false
        type: string

      environment:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: reusable-repo
  AWS_ACCOUNT_ID: 293033346072
  IMAGE_TAG: ${{ github.run_number }}
#test
jobs:

  build-and-push:
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.environment }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Maven Project
        run: mvn clean package

      - name: Build Docker Image
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
            role-to-assume: arn:aws:iam::293033346072:role/github-oidc-role
            #role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
            aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
              aws ecr get-login-password --region $AWS_REGION \
              | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Tag Image
        run: |
              docker tag $ECR_REPOSITORY:$IMAGE_TAG \
              $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Image to ECR
        run: |
              docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG


  deploy-to-ecs:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment}}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4      

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
            role-to-assume: arn:aws:iam::293033346072:role/github-oidc-role
            aws-region: ${{ env.AWS_REGION }}

      - name: Render ECS Task Definition
        run: |
          sed -i "s|<IMAGE_URI>|$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG|g" taskdef.json

      - name: Register new Task Definition
        id: taskdef
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://taskdef.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "TASK_DEF_ARN=$TASK_DEF_ARN" >> $GITHUB_ENV

      - name: Update ECS Service with new task definition
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --task-definition $TASK_DEF_ARN \
            --region $AWS_REGION
          
            echo "Cluster=${{ secrets.ECS_CLUSTER }}"
            echo "Service=${{ secrets.ECS_SERVICE }}"