name: Deploy To EC2

on:
  workflow_call:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-jar

      - name: Create SSH Key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Verify Download
        run: ls -ltr

      - name: Copy JAR To EC2
        run: |
          scp -o StrictHostKeyChecking=no \
          -i key.pem \
          *.jar \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ec2-user/springboot-app/

      - name: Debug EC2
        run: |
            ssh -vvv -o StrictHostKeyChecking=no \
            -i key.pem \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            whoami
            pwd
            ls -ltr /home/ec2-user/springboot-app
            "